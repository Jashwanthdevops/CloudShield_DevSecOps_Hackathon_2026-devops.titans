apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-java-app
  labels:
    app: devsecops-java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-java-app
  template:
    metadata:
      labels:
        app: devsecops-java-app
    spec:
      containers:
        - name: devsecops-java-app
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/devsecops-java-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      imagePullSecrets:
        - name: ecr-registry-secret   # Optional: required if private ECR access
