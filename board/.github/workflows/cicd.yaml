name: Java CI/CD to AWS ECR & Kubernetes

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 571264418338.dkr.ecr.ap-northeast-1.amazonaws.com
  ECR_REPOSITORY: devsecops-java-app
  IMAGE_TAG: latest
  K8S_DEPLOYMENT_FILE: k8s/deployment.yaml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Set up Java JDK 17
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      # 3️⃣ Build Java app with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Log in to AWS ECR
      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          region: ${{ env.AWS_REGION }}

      # 5️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      # 6️⃣ Tag Docker image for ECR
      - name: Tag Docker image
        run: docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 7️⃣ Push Docker image to ECR
      - name: Push Docker image
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 8️⃣ Set up kubectl to deploy
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      # 9️⃣ Configure kubeconfig (using GitHub secrets for access)
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name devsecops-eks

      # 🔟 Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: kubectl apply -f $K8S_DEPLOYMENT_FILE
